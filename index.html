<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <title>FieldMap</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📍</text></svg>">
    <!-- MapLibre GL JS Styles -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css">
    <!-- Application Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/share_stash.css">
</head>

<body>
    <!-- Fullscreen Map Container -->
    <div id="map"></div>

    <!-- Global Warning Overlay (e.g., Geolocation Failed) -->
    <div id="global_overlay">
        <span class="message-text"></span>
        <button class="close-btn" id="overlay_close_btn">×</button>
    </div>

    <!-- Share Stash Indicator (PWA Share Target) -->
    <div id="share_stash_indicator" class="share-stash-indicator hidden">
        <img id="stash_thumbnail" class="stash-thumbnail">
        <button id="stash_close_btn" class="stash-close-btn" title="Clear shared image">×</button>
    </div>

    <!-- Custom UI Controls -->
    <div class="custom-controls-top-right">
        <button id="refresh_btn" class="map-control-btn" title="Refresh Page" style="display: none;">
            <svg viewBox="0 0 24 24" width="18" height="18">
                <path fill="currentColor" d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
            </svg>
        </button>
        <button id="geolocate_btn" class="map-control-btn" title="Center on location">
            <svg viewBox="0 0 24 24" width="18" height="18">
                <path fill="currentColor" d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z" />
            </svg>
        </button>
        <button id="keys_btn" class="map-control-btn" title="Settings">
            🔑
        </button>
    </div>

    <!-- Credentials Interface -->
    <div id="credentials_form">
        <div class="credentials-content">
            <div class="close-credentials-btn" id="close_credentials_btn">×</div>
            <h2>Settings & Credentials</h2>
            <div class="input-group">
                <label for="github_token">GitHub Personal Access Token</label>
                <input type="text" id="github_token">
            </div>
            <div class="input-group">
                <label for="maptiler_key">MapTiler API Key</label>
                <input type="text" id="maptiler_key">
            </div>
            <button id="save_credentials_btn">Save and Refresh</button>
        </div>
    </div>

    <!-- Context Menu Container -->
    <div id="context_menu" class="hidden">
        <div id="menu_header" class="menu-header"></div>
        <div id="menu_thumbnail_container" class="menu-thumbnail-container">
            <a id="menu_thumbnail_link" target="_blank" rel="noopener noreferrer">
                <img id="menu_thumbnail" class="menu-thumbnail">
            </a>
            <div id="menu_thumbnail_error" class="thumbnail-error"></div>
        </div>
        <ul id="context_menu_options"></ul>
    </div>

    <!-- Hidden Image Acquisition Inputs -->
    <!-- Force camera on mobile -->
    <input type="file" id="camera_input" accept="image/*" capture="environment" style="display: none;">
    <!-- Standard picker for gallery -->
    <input type="file" id="gallery_input" accept="image/*" style="display: none;">

    <!-- MapLibre JS Library -->
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>

    <!-- HEIC/HEIF Image Support -->
    <script src="https://unpkg.com/heic2any@0.0.4/dist/heic2any.js"></script>

    <!-- Application Entry Point -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
